<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acquisitions Management Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Acquisitions Management Platform</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="showNewAcquisitionModal()">+ New Acquisition</button>
                <button class="btn btn-secondary" onclick="showEmailTemplates()">Email Templates</button>
            </div>
        </header>

        <main>
            <!-- Acquisition Tabs -->
            <div class="tabs-container">
                <div class="tabs" id="acquisitionTabs">
                    <!-- Tabs will be dynamically added here -->
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="content-area">
                <!-- Carrier List Section -->
                <div class="section carrier-section">
                    <div class="section-header">
                        <h2 id="currentAcquisitionName">Select an acquisition</h2>
                        <div class="status-legend">
                            <span class="legend-item"><span class="status-indicator done"></span> Completed</span>
                            <span class="legend-item"><span class="status-indicator outstanding"></span> Outstanding</span>
                        </div>
                    </div>

                    <div class="carriers-list" id="carriersList">
                        <!-- Carriers will be dynamically added here -->
                    </div>
                </div>

                <!-- Activity Log Section -->
                <div class="section activity-section">
                    <div class="section-header">
                        <h3>Activity Log</h3>
                        <button class="btn btn-small" onclick="showActivityModal()">+ Add Activity</button>
                    </div>
                    <div class="activity-list" id="activityList">
                        <!-- Activities will be dynamically added here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- New Acquisition Modal -->
    <div id="newAcquisitionModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('newAcquisitionModal')">&times;</span>
            <h2>New Acquisition</h2>
            <form id="newAcquisitionForm" onsubmit="createAcquisition(event)">
                <div class="form-group">
                    <label for="acquisitionName">Acquisition Name:</label>
                    <input type="text" id="acquisitionName" required>
                </div>
                <div class="form-group">
                    <label for="dateAcquired">Date Acquired:</label>
                    <input type="date" id="dateAcquired" required>
                </div>
                <div class="form-group">
                    <label for="previousOwner">Previous Owner:</label>
                    <input type="text" id="previousOwner" required>
                </div>
                <div class="form-group">
                    <label for="newOwner">New Owner (LLC Name):</label>
                    <input type="text" id="newOwner" required>
                </div>
                <div class="form-group">
                    <label for="fein">FEIN:</label>
                    <input type="text" id="fein" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Acquisition</button>
            </form>
        </div>
    </div>

    <!-- Email Template Modal -->
    <div id="emailTemplateModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeModal('emailTemplateModal')">&times;</span>
            <h2>Email Templates</h2>
            <div class="email-templates">
                <div class="template-selector">
                    <button class="template-btn" onclick="loadTemplate('initial')">Initial Conversion Request</button>
                    <button class="template-btn" onclick="loadTemplate('followup')">Follow-up Reminder</button>
                    <button class="template-btn" onclick="loadTemplate('urgent')">Urgent Request</button>
                    <button class="template-btn" onclick="loadTemplate('confirmation')">Conversion Confirmation</button>
                    <button class="template-btn" onclick="loadTemplate('completion')">Completion Notice</button>
                </div>
                <div class="template-preview">
                    <div class="form-group">
                        <label>Select Carriers:</label>
                        <div id="carrierCheckboxes" class="carrier-checkboxes">
                            <!-- Carrier checkboxes will be added here -->
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="emailSubject">Subject:</label>
                        <input type="text" id="emailSubject" class="full-width">
                    </div>
                    <div class="form-group">
                        <label for="emailBody">Message:</label>
                        <textarea id="emailBody" rows="12" class="full-width"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="sendEmail()">Send Email</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Activity Modal -->
    <div id="activityModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('activityModal')">&times;</span>
            <h2>Add Activity</h2>
            <form id="activityForm" onsubmit="addActivity(event)">
                <div class="form-group">
                    <label for="activityType">Type:</label>
                    <select id="activityType" required>
                        <option value="email">Email</option>
                        <option value="call">Phone Call</option>
                        <option value="note">Note</option>
                        <option value="meeting">Meeting</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="activityContact">Contact:</label>
                    <input type="text" id="activityContact" required>
                </div>
                <div class="form-group">
                    <label for="activityCarrier">Carrier:</label>
                    <select id="activityCarrier" required>
                        <!-- Will be populated dynamically -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="activityNotes">Notes:</label>
                    <textarea id="activityNotes" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Add Activity</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
